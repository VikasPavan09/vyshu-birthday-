<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Vyshu ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#090909;
color:white;
overflow:hidden;
height:100vh;
}

.screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:30px;
transition:1s;
}

.hidden{
display:none;
}

h1{
font-size:3rem;
margin-bottom:20px;
color:#ffd699;
}

p{
max-width:800px;
line-height:1.8;
font-size:1.2rem;
}

button{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:50px;
cursor:pointer;
font-size:18px;
}

.next{background:#ffd699;}
.yes{background:#ff4f81;color:white;}
.no{background:white;color:black;}

.buttons{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.result{
font-size:1.2rem;
line-height:2;
max-width:900px;
white-space:pre-line;
}

/* Falling icons */
.falling{
position:absolute;
top:-50px;
font-size:24px;
animation:fall linear infinite;
opacity:.8;
}

@keyframes fall{
from{transform:translateY(-50px);}
to{transform:translateY(110vh);}
}
</style>
</head>

<body>

<!-- BIRTHDAY -->
<div id="birthday" class="screen">
<h1>🎂 Happy Birthday Vyshu ❤️</h1>
<p>
Today is not just another day.<br><br>
It's the day someone special came into this world ❤️
</p>
<button class="next" onclick="goMemory()">Continue ❤️</button>
</div>

<!-- MEMORY -->
<div id="memory" class="screen hidden">
<h1>📖 Our Story</h1>
<p>
4 months... but feels like forever.<br><br>
You became someone very special to me ❤️
</p>
<button class="next" onclick="goProposal()">One More Thing 💍</button>
</div>

<!-- PROPOSAL -->
<div id="proposal" class="screen hidden">
<h1>❤️ Vyshuuu ❤️</h1>

<p>
Will you be part of my life forever? ❤️
</p>

<div class="buttons">
<button class="yes" onclick="showYes()">❤️ YES</button>
<button class="no" onclick="showNo()">🌹 NO</button>
</div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec"; 
// ⚠️ replace this with real Apps Script URL

function saveAnswer(ans){
fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({answer:ans})
}).catch(()=>{});
}

function goMemory(){
document.getElementById("birthday").classList.add("hidden");
document.getElementById("memory").classList.remove("hidden");
}

function goProposal(){
document.getElementById("memory").classList.add("hidden");
document.getElementById("proposal").classList.remove("hidden");
}

/* FINAL RESULT - YES */
function showYes(){

saveAnswer("YES ❤️");

document.body.innerHTML = `
<div class="screen">
<h1>❤️ YES SELECTED ❤️</h1>

<div class="result">

Nijam cheppali ante ni love ki nen right person or kadhu ane vishayam nak thelidhu.

But I promise I will always stay with you ❤️

LOVE YOU VYSHUUUU ❤️

</div>
</div>
`;
}

/* FINAL RESULT - NO */
function showNo(){

saveAnswer("NO 🌹");

document.body.innerHTML = `
<div class="screen">
<h1>🌹 RESPONSE</h1>

<div class="result">

Pedhaga cheppaniki inkem ledhu...

But you will always be special to me ❤️

</div>
</div>
`;
}

</script>

</body>
</html>
